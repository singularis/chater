apiVersion: v1
kind: Namespace
metadata:
  name: chater-vision
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chater-vision
  namespace: chater-vision
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chater-vision
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: 'true'
      labels:
        app: chater-vision
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - racoon
                - racoon-gpu
      containers:
      - env:
        - name: VISION_API_KEY
          valueFrom:
            secretKeyRef:
              key: VISION_API_KEY
              name: chater-vision
        - name: BOOTSTRAP_SERVERS
          value: '{{ vars.BOOTSTRAP_SERVER }}'
        - name: LOG_LEVEL
          value: '{{ vars.LOG_LEVEL }}'
        image: docker.io/singularis314/chater-vision
        imagePullPolicy: Always
        name: chater-vision
---
apiVersion: v1
data:
  VISION_API_KEY: '{{ vars.GEMINI_API_KEY | b64encode }}'
kind: Secret
metadata:
  name: chater-vision
  namespace: chater-vision

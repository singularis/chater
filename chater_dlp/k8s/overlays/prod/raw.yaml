apiVersion: v1
kind: Namespace
metadata:
  name: chater-dlp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chater-dlp
  namespace: chater-dlp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chater-dlp
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: 'true'
      labels:
        app: chater-dlp
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - racoon
                - racoon-gpu
      containers:
      - env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/secrets/google/service-account.json
        - name: GCP_PROJECT_ID
          value: '{{ vars.GCP_PROJECT_ID }}'
        - name: BOOTSTRAP_SERVER
          value: '{{ vars.BOOTSTRAP_SERVER }}'
        - name: LOG_LEVEL
          value: '{{ vars.LOG_LEVEL }}'
        image: docker.io/singularis314/chater_dlp
        imagePullPolicy: Always
        name: chater-dlp
        volumeMounts:
        - mountPath: /var/secrets/google
          name: gcp-dlp-creds
          readOnly: true
      volumes:
      - name: gcp-dlp-creds
        secret:
          secretName: gcp-dlp-service-account

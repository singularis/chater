- name: Deploy Kubernetes objects for auth application (DEV)
  hosts: localhost
  gather_facts: no

  vars_files:
    - ../../vars.yaml

  tasks:
    - name: Create chater-auth-dev Namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: chater-auth-dev
    - name: Deploy chater-auth-dev Deployment
      kubernetes.core.k8s:
        state: present
        namespace: chater-auth-dev
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: chater-auth-dev
            namespace: chater-auth-dev
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: chater-auth-dev
            template:
              metadata:
                labels:
                  app: chater-auth-dev
                annotations:
                  co.elastic.logs/enabled: "true"
              spec:
                containers:
                  - name: chater-auth-dev
                    image: docker.io/singularis314/chater-auth-dev:0.3
                    imagePullPolicy: Always
                    env:
                      - name: IS_DEV
                        value: "true"
                      # ── JWT signing secret (server-side only, never in client) ──
                      - name: JWT_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: chater-auth-dev
                            key: JWT_SECRET
                      # ── Google OAuth ──
                      - name: GOOGLE_CLIENT_ID
                        value: "{{ vars.GOOGLE_CLIENT_ID }}"
                      # ── Apple OAuth ──
                      - name: APPLE_BUNDLE_ID
                        value: "{{ vars.APPLE_BUNDLE_ID }}"
                      # ── Token lifetime ──
                      - name: JWT_EXPIRATION_HOURS
                        value: "{{ vars.JWT_EXPIRATION_HOURS }}"
                      # ── Infrastructure ──
                      - name: BOOTSTRAP_SERVERS
                        value: "{{ vars.BOOTSTRAP_SERVER }}"
                      - name: LOG_LEVEL
                        value: "{{ vars.LOG_LEVEL }}"

    - name: Create secret for environment variables
      kubernetes.core.k8s:
        state: present
        namespace: chater-auth-dev
        kind: Secret
        name: chater-auth-dev
        resource_definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: chater-auth-dev
            namespace: chater-auth-dev
          data:
            JWT_SECRET: "{{ vars.JWT_SECRET | b64encode }}"

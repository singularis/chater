apiVersion: v1
kind: Namespace
metadata:
  name: eater-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eater-postgres-mcp-dev
  namespace: eater-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eater-postgres-mcp-dev
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: 'false'
      labels:
        app: eater-postgres-mcp-dev
    spec:
      containers:
      - args:
        - --access-mode=restricted
        - --transport=sse
        - --sse-host=0.0.0.0
        env:
        - name: IS_DEV
          value: 'true'
        - name: PGHOST
          value: eater-db-dev.eater-dev.svc.cluster.local
        - name: PGDATABASE
          value: eater_dev
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              key: username
              name: eater-dev.eater-db-dev.credentials.postgresql.acid.zalan.do
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: eater-dev.eater-db-dev.credentials.postgresql.acid.zalan.do
        - name: DATABASE_URI
          value: postgresql://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE)
        image: docker.io/crystaldba/postgres-mcp:latest
        name: eater-postgres-mcp-dev
        ports:
        - containerPort: 8000
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: eater-postgres-mcp-dev
  namespace: eater-dev
spec:
  loadBalancerIP: '{{ vars.DEV.MCP_POSTGRES_LB_IP }}'
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: http
  selector:
    app: eater-postgres-mcp-dev
  sessionAffinity: ClientIP
  type: LoadBalancer

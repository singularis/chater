apiVersion: v1
kind: Namespace
metadata:
  name: eater
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eater
  namespace: eater
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eater
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: 'true'
      labels:
        app: eater
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - racoon
                - racoon-gpu
      containers:
      - env:
        - name: BOOTSTRAP_SERVER
          value: '{{ vars.BOOTSTRAP_SERVER }}'
        - name: POSTGRES_USER
          value: '{{ vars.EATER.DB_NAME }}'
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: '{{ vars.EATER.DB_PASSWORD }}'
        - name: POSTGRES_DB
          value: '{{ vars.EATER.DB_NAME }}'
        - name: POSTGRES_HOST
          value: '{{ vars.EATER.POSTGRES_HOST }}'
        - name: LOG_LEVEL
          value: '{{ vars.LOG_LEVEL }}'
        image: docker.io/singularis314/eater
        imagePullPolicy: Always
        name: eater
      initContainers:
      - env:
        - name: POSTGRES_USER
          value: '{{ vars.EATER.DB_NAME }}'
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: '{{ vars.EATER.DB_PASSWORD }}'
        - name: POSTGRES_DB
          value: '{{ vars.EATER.DB_NAME }}'
        - name: POSTGRES_HOST
          value: '{{ vars.EATER.POSTGRES_HOST }}'
        image: docker.io/singularis314/eater
        imagePullPolicy: Always
        name: eater-init-db
---
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  labels:
    team: acid
  name: eater-db
  namespace: eater
spec:
  allowedSourceRanges:
  - 0.0.0.0/32
  databases:
    eater: eater
  maintenanceWindows: []
  numberOfInstances: 2
  patroni:
    initdb:
      data-checksums: 'true'
      encoding: UTF8
  podAnnotations: {}
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: cluster-name
            operator: In
            values:
            - eater-db
        topologyKey: kubernetes.io/hostname
      weight: 100
  postgresql:
    version: '16'
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 100Mi
  teamId: acid
  tolerations:
  - effect: NoSchedule
    key: gpu-only
    operator: Exists
  users:
    eater: []
  volume:
    size: 10Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: eater-postgres-pvc
  namespace: eater
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 10Gi
  local:
    path: /other/eater_postgres
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - racoon
  persistentVolumeReclaimPolicy: Recycle
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: eater-postgres-pvc-gpu
  namespace: eater
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 10Gi
  local:
    path: /other/eater_postgres
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - racoon-gpu
  persistentVolumeReclaimPolicy: Recycle
  volumeMode: Filesystem

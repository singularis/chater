apiVersion: v1
kind: Namespace
metadata:
  name: '{{ vars.MODELS_PROCESSOR.NAMESPACE }}'
---
apiVersion: v1
kind: Service
metadata:
  name: models-processor
  namespace: '{{ vars.MODELS_PROCESSOR.NAMESPACE }}'
spec:
  ports:
  - port: 8000
    protocol: TCP
    targetPort: 8000
  selector:
    app: models-processor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: models-processor
  namespace: '{{ vars.MODELS_PROCESSOR.NAMESPACE }}'
spec:
  replicas: 2
  selector:
    matchLabels:
      app: models-processor
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: 'true'
      labels:
        app: models-processor
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - racoon-gpu
            weight: 100
      containers:
      - env:
        - name: BOOTSTRAP_SERVER
          value: '{{ vars.BOOTSTRAP_SERVER }}'
        - name: LOCAL_MODEL_KAFKA_TOPIC
          value: '{{ vars.MODELS_PROCESSOR.LOCAL_MODEL_KAFKA_TOPIC }}'
        - name: OLLAMA_HOST
          value: '{{ vars.MODELS_PROCESSOR.OLLAMA_HOST }}'
        - name: OLLAMA_MODEL
          value: '{{ vars.MODELS_PROCESSOR.OLLAMA_MODEL }}'
        - name: LOG_LEVEL
          value: '{{ vars.LOG_LEVEL }}'
        image: docker.io/singularis314/models_processor
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 300
        name: models-processor
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: eater

images:
  - name: ghcr.io/open-webui/mcpo
    newName: ghcr.io/open-webui/mcpo
    newTag: main

patches:
  - patch: |-
      - op: add
        path: /spec/loadBalancerIP
        value: "192.168.0.115"
    target:
      kind: Service
      name: mcpo-postgres
  - patch: |-
      - op: replace
        path: /data/config.json
        value: |
          {
            "mcpServers": {
              "postgres-eater": {
                "type": "sse",
                "url": "http://eater-postgres-mcp/sse"
              }
            }
          }
    target:
      kind: ConfigMap
      name: mcpo-config

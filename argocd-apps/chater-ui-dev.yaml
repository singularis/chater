apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chater-ui-dev
  namespace: argocd
spec:
  project: dev-project
  source:
    repoURL: 'https://github.com/singularis/chater.git'
    targetRevision: env/dev
    path: chater_ui/k8s/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: chater-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: v1
kind: Namespace
metadata:
  name: eater-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eater-users-dev
  namespace: eater-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eater-users-dev
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: 'true'
      labels:
        app: eater-users-dev
    spec:
      containers:
      - env:
        - name: IS_DEV
          value: 'true'
        - name: BOOTSTRAP_SERVER
          value: '{{ vars.BOOTSTRAP_SERVER }}'
        - name: POSTGRES_USER
          value: eater_dev
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: eater-dev.eater-db-dev.credentials.postgresql.acid.zalan.do
        - name: POSTGRES_DB
          value: eater_dev
        - name: POSTGRES_HOST
          value: eater-db-dev.eater-dev.svc.cluster.local
        - name: JWT_SECRET
          value: '{{ vars.JWT_SECRET }}'
        - name: REDIS_ENDPOINT
          value: '{{ vars.REDIS_ENDPOINT }}'
        - name: NEO4J_URI
          value: bolt://neo4j.neo4j.svc.cluster.local:7687
        - name: NEO4J_USER
          value: neo4j
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              key: NEO4J_PASSWORD
              name: neo4j-auth-eater
        - name: LOG_LEVEL
          value: '{{ vars.LOG_LEVEL }}'
        image: docker.io/singularis314/eater_user
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 300
        name: eater-users-dev
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
      imagePullSecrets:
      - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: eater-users-dev-internal
  namespace: eater-dev
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8000
  selector:
    app: eater-users-dev
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: eater-users-dev-service
  namespace: chater-ui-dev
spec:
  externalName: eater-users-dev-internal.eater-dev.svc.cluster.local
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  type: ExternalName
---
apiVersion: v1
kind: Service
metadata:
  name: eater-users-dev-lb
  namespace: eater-dev
spec:
  loadBalancerIP: '{{ vars.DEV.EATER_USERS_LB_IP }}'
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8000
  selector:
    app: eater-users-dev
  type: LoadBalancer

apiVersion: v1
kind: Namespace
metadata:
  name: eater-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eater-dev
  namespace: eater-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eater-dev
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: 'true'
      labels:
        app: eater-dev
    spec:
      containers:
      - env:
        - name: IS_DEV
          value: 'true'
        - name: BOOTSTRAP_SERVER
          value: '{{ vars.BOOTSTRAP_SERVER }}'
        - name: POSTGRES_USER
          value: eater_dev
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: eater-dev.eater-db-dev.credentials.postgresql.acid.zalan.do
        - name: POSTGRES_DB
          value: eater_dev
        - name: POSTGRES_HOST
          value: eater-db-dev.eater-dev.svc.cluster.local
        - name: LOG_LEVEL
          value: '{{ vars.LOG_LEVEL }}'
        image: docker.io/singularis314/eater
        imagePullPolicy: Always
        name: eater-dev
      initContainers:
      - env:
        - name: IS_DEV
          value: 'true'
        - name: POSTGRES_USER
          value: eater_dev
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: eater-dev.eater-db-dev.credentials.postgresql.acid.zalan.do
        - name: POSTGRES_DB
          value: eater_dev
        - name: POSTGRES_HOST
          value: eater-db-dev.eater-dev.svc.cluster.local
        image: docker.io/singularis314/eater
        imagePullPolicy: Always
        name: eater-init-db
---
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  labels:
    team: acid
  name: eater-db-dev
  namespace: eater-dev
spec:
  allowedSourceRanges:
  - 0.0.0.0/32
  databases:
    eater_dev: eater_dev
  maintenanceWindows: []
  numberOfInstances: 1
  patroni:
    initdb:
      data-checksums: 'true'
      encoding: UTF8
  podAnnotations: {}
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: cluster-name
            operator: In
            values:
            - eater-db-dev
        topologyKey: kubernetes.io/hostname
      weight: 100
  postgresql:
    version: '16'
  resources:
    limits:
      cpu: 250m
      memory: 250Mi
    requests:
      cpu: 50m
      memory: 50Mi
  teamId: acid
  users:
    eater_dev: []
  volume:
    size: 5Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: eater-postgres-dev-pvc
  namespace: eater-dev
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 5Gi
  local:
    path: /other/eater_postgres_dev
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - racoon
  persistentVolumeReclaimPolicy: Recycle
  volumeMode: Filesystem

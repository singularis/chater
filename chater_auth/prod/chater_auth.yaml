- name: Deploy Kubernetes objects for auth application
  hosts: localhost
  gather_facts: no

  vars_files:
    - ../../vars.yaml

  tasks:
    - name: Create chater-auth Namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: chater-auth
    - name: Deploy chater-auth Deployment
      kubernetes.core.k8s:
        state: present
        namespace: chater-auth
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: chater-auth
            namespace: chater-auth
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: chater-auth
            template:
              metadata:
                labels:
                  app: chater-auth
                annotations:
                  co.elastic.logs/enabled: "true"
              spec:
                containers:
                  - name: chater-auth
                    image: docker.io/singularis314/chater-auth:0.3
                    imagePullPolicy: Always
                    env:
                      # ── JWT signing secret (server-side only, never in client) ──
                      - name: JWT_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: chater-auth
                            key: JWT_SECRET
                      # ── Google OAuth ──
                      - name: GOOGLE_CLIENT_ID
                        value: "{{ vars.GOOGLE_CLIENT_ID }}"
                      # ── Apple OAuth ──
                      - name: APPLE_BUNDLE_ID
                        value: "{{ vars.APPLE_BUNDLE_ID }}"
                      # ── Token lifetime ──
                      - name: JWT_EXPIRATION_HOURS
                        value: "{{ vars.JWT_EXPIRATION_HOURS }}"
                      # ── Infrastructure ──
                      - name: BOOTSTRAP_SERVERS
                        value: "{{ vars.BOOTSTRAP_SERVER }}"
                      - name: LOG_LEVEL
                        value: "{{ vars.LOG_LEVEL }}"
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: kubernetes.io/hostname
                              operator: In
                              values:
                                - racoon
                                - racoon-gpu
    - name: Create secret for environment variables
      kubernetes.core.k8s:
        state: present
        namespace: chater-auth
        kind: Secret
        name: chater-auth
        resource_definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: chater-auth
            namespace: chater-auth
          data:
            JWT_SECRET: "{{ vars.JWT_SECRET | b64encode }}"
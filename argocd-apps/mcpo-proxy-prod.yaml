apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcpo-postgres-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/singularis/chater.git'
    targetRevision: env/prod
    path: mcpo-proxy/k8s/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: eater
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

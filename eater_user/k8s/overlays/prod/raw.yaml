apiVersion: v1
kind: Namespace
metadata:
  name: eater
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eater-users
  namespace: eater
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eater-users
  template:
    metadata:
      annotations:
        co.elastic.logs/enabled: 'true'
      labels:
        app: eater-users
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - racoon
                - racoon-gpu
      containers:
      - env:
        - name: BOOTSTRAP_SERVER
          value: '{{ vars.BOOTSTRAP_SERVER }}'
        - name: POSTGRES_USER
          value: '{{ vars.EATER.DB_NAME }}'
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: '{{ vars.EATER.DB_PASSWORD }}'
        - name: POSTGRES_DB
          value: '{{ vars.EATER.DB_NAME }}'
        - name: POSTGRES_HOST
          value: '{{ vars.EATER.POSTGRES_HOST }}'
        - name: JWT_SECRET
          value: '{{ vars.JWT_SECRET }}'
        - name: REDIS_ENDPOINT
          value: '{{ vars.REDIS_ENDPOINT }}'
        - name: NEO4J_URI
          value: bolt://neo4j.neo4j.svc.cluster.local:7687
        - name: NEO4J_USER
          value: neo4j
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              key: NEO4J_PASSWORD
              name: neo4j-auth-eater
        - name: LOG_LEVEL
          value: '{{ vars.LOG_LEVEL }}'
        image: docker.io/singularis314/eater_user
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 300
        name: eater-users
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: eater-users-internal
  namespace: eater
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8000
  selector:
    app: eater-users
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: eater-users-service
  namespace: chater-ui
spec:
  externalName: eater-users-internal.eater.svc.cluster.local
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  type: ExternalName
---
apiVersion: v1
kind: Service
metadata:
  name: eater-users-lb
  namespace: eater
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8000
  selector:
    app: eater-users
  type: LoadBalancer
---
apiVersion: v1
stringData:
  NEO4J_PASSWORD: '{{ vars.EATER.NEO4J_PASSWORD }}'
kind: Secret
metadata:
  name: neo4j-auth-eater
  namespace: eater
type: Opaque
